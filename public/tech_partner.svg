<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
<!-- الأنماط البرمجية المدمجة للحركة والتوهج -->
<style>
@keyframes flow-fast {
from { stroke-dashoffset: 600; }
to { stroke-dashoffset: 0; }
}
@keyframes flow-slow {
from { stroke-dashoffset: 1000; }
to { stroke-dashoffset: 0; }
}
@keyframes flicker-anim {
0%, 100% { opacity: 0.8; }
50% { opacity: 1; }
}
@keyframes blink {
50% { opacity: 0; }
}
@keyframes glow-pulse-anim {
0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4)); }
50% { filter: drop-shadow(0 0 35px rgba(0, 242, 255, 0.6)); }
}
@keyframes spark-float {
0% { transform: translate(0, 0); opacity: 0; }
20% { opacity: 1; }
100% { transform: translate(60px, -20px); opacity: 0; }
}

.trace-power {
  stroke-dasharray: 200;
  animation: flow-fast 4s linear infinite;
}
.trace-logic {
  stroke-dasharray: 100;
  animation: flow-slow 12s linear infinite;
  opacity: 0.5;
}
.flicker {
  animation: flicker-anim 0.1s infinite;
}
.cursor {
  animation: blink 1s step-end infinite;
}
.glow-pulse {
  animation: glow-pulse-anim 4s ease-in-out infinite;
}
.terminal-code {
  font-family: 'Courier New', monospace;
  fill: #ff007f;
  font-size: 26px;
  font-weight: bold;
}
.spark {
  animation: spark-float 0.8s ease-out infinite;
}


</style>

<defs>
<!-- تدرج الألوان السايبربانك -->
<linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00f2ff" />
<stop offset="50%" stop-color="#bc13fe" />
<stop offset="100%" stop-color="#ff007f" />
</linearGradient>

<!-- فلتر توهج النيون -->
<filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="4" result="blur" />
  <feMerge>
    <feMergeNode in="blur" />
    <feMergeNode in="SourceGraphic" />
  </feMerge>
</filter>


</defs>

<!-- خلفية داكنة اختيارية (يمكن إزالتها للشفافية) -->



<g class="glow-pulse" filter="url(#neon-glow)">
<!-- الهيكل الأساسي (العمق) -->
<path d="M 150 320 L 150 100 L 300 250 L 450 100 L 450 180"
stroke="rgba(0,0,0,0.6)" stroke-width="24" fill="none" stroke-linecap="round" />

<!-- مسارات الطاقة المضيئة -->
<path d="M 150 320 L 150 100 L 300 250 L 450 100 L 450 180" 
      stroke="url(#metalGrad)" stroke-width="10" fill="none" stroke-linecap="round" class="trace-power" />

<!-- خطوط المنطق الرفيعة -->
<path d="M 138 320 L 138 92 L 300 262 L 462 92 L 462 165" 
      stroke="#00f2ff" stroke-width="1.5" fill="none" stroke-linecap="round" class="trace-logic" />

<!-- عُقد الأجهزة المتوهجة -->
<g fill="white">
  <circle cx="150" cy="100" r="5" class="flicker" />
  <circle cx="300" cy="250" r="8" fill="#00f2ff" />
  <circle cx="450" cy="100" r="5" class="flicker" />
  <circle cx="150" cy="320" r="4" opacity="0.6" fill="#bc13fe" />
</g>

<!-- رمز الكود الختامي -->
<g transform="translate(435, 190)">
  <rect x="0" y="0" width="25" height="5" fill="#00f2ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.2s" repeatCount="indefinite" />
  </rect>
  <rect x="10" y="10" width="15" height="3" fill="#ff007f" />
  
  <text x="-15" y="70" class="terminal-code">
    />_ <tspan class="cursor" fill="white">█</tspan>
  </text>
</g>

<!-- شرارات البيانات المتحركة -->
<g>
  <rect x="450" y="200" width="8" height="1.5" fill="#00f2ff" class="spark" style="animation-delay: 0s;" />
  <rect x="460" y="215" width="12" height="1.5" fill="#ff007f" class="spark" style="animation-delay: 0.3s;" />
  <rect x="445" y="230" width="6" height="1.5" fill="#00f2ff" class="spark" style="animation-delay: 0.6s;" />
</g>


</g>
</svg>